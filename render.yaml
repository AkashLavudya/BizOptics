services:
  - type: web
    name: bizoptics-backend-api
    runtime: node
    repo: https://github.com/your-username/your-repo-name # Replace with your repo
    branch: main
    # Render builds from root to support shared workspace packages
    buildCommand: npm install && npm run build --workspace=packages/shared && npx prisma generate --schema=apps/server/prisma/schema.prisma && npm run build --workspace=apps/server
    startCommand: node apps/server/dist/src/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        value: postgresql://username:password@hostname:5432/db # Replace with your Neon Database URL
      - key: JWT_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: JWT_REFRESH_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGINS
        value: https://your-frontend-vercel-url.vercel.app # Replace with your Vercel URL
      - key: GOOGLE_PLACES_API_KEY
        value: "" # Fill with your Google Places Key if applicable
