version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: boi_postgres
    restart: always
    environment:
      POSTGRES_DB: boi_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boi_network

  redis:
    image: redis:7-alpine
    container_name: boi_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boi_network

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: boi_server
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/boi_platform?schema=public
      REDIS_URL: redis://redis:6379
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - boi_network
    env_file:
      - .env

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: boi_web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://server:3001/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - boi_network
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:

networks:
  boi_network:
    driver: bridge
